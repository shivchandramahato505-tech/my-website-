<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kishan Shop | Profit & Loss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #4CAF50; 
            --secondary: #1A365D; 
            --bg: #f4f7f6; 
            --white: #ffffff;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }

        /* --- PROFESSIONAL TOP BAR --- */
        .top-bar {
            position: fixed; top: 0; width: 100%; height: 65px;
            background: var(--white); display: flex; align-items: center; padding: 0 20px;
            z-index: 3000; box-shadow: 0 2px 15px rgba(0,0,0,0.08); box-sizing: border-box;
        }

        /* --- ANIMATED MENU BUTTON --- */
        .menu-btn { cursor: pointer; width: 30px; height: 22px; display: flex; flex-direction: column; justify-content: space-between; z-index: 3100; }
        .menu-btn div { width: 100%; height: 3.5px; background: var(--secondary); border-radius: 5px; transition: 0.3s; transform-origin: left center; }
        .menu-btn.is-active .line1 { transform: rotate(45deg); background: var(--primary); }
        .menu-btn.is-active .line2 { opacity: 0; }
        .menu-btn.is-active .line3 { transform: rotate(-45deg); background: var(--primary); }

        /* --- SIDEBAR & OVERLAY --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; opacity: 0; transition: 0.3s; }
        .overlay.show { display: block; opacity: 1; }

        .sidebar { 
            position: fixed; left: -320px; top: 0; width: 300px; height: 100%; 
            background: var(--white); z-index: 2500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        
        .sidebar-header { background: var(--primary); padding: 40px 20px 20px; color: white; text-align: center; }
        #profile-pic-sidebar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; object-fit: cover; margin-bottom: 10px; }

        .nav-list { padding: 15px; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 14px 20px; border-radius: 12px; color: #333; text-decoration: none; font-weight: 600; cursor: pointer; margin-bottom: 5px; }
        .nav-item:hover { background: #f0fdf4; color: var(--primary); }
        .nav-item i { color: var(--primary); width: 20px; text-align: center; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 4000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; width: 90%; max-width: 400px; border-radius: 20px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }

        /* --- P&L CONTENT --- */
        .container { display: flex; flex-direction: column; align-items: center; padding: 85px 20px 40px; gap: 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h4 { margin: 0; color: #666; font-size: 14px; }
        .stat-card p { margin: 10px 0 0; font-size: 20px; font-weight: bold; color: var(--primary); }

        .card-long { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        .history-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .profit-text { color: #2e7d32; font-weight: bold; }
        
        .filter-btn { padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 12px; font-weight: bold; }
        .active-filter { background: var(--secondary); color: white; border-color: var(--secondary); }

        .btn-save { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="handleMenu()"></div>

<div class="top-bar">
    <div class="menu-btn" id="menuBtn" onclick="handleMenu()">
        <div class="line1"></div><div class="line2"></div><div class="line3"></div>
    </div>
    <div style="margin-left: 15px; font-weight: 800; color: var(--primary); letter-spacing: 0.5px;">HI KISHAN</div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="https://via.placeholder.com/80" id="profile-pic-sidebar">
        <h3 id="display-name" class="trans" data-en="Welcome, Shopkeeper" data-ne="स्वागत छ, पसले">Welcome, Shopkeeper</h3>
        <button onclick="openModal()" style="background:rgba(255,255,255,0.2); border:1px solid white; color:white; border-radius:8px; padding:5px 12px; cursor:pointer; font-size:11px;">Edit Profile</button>
    </div>
    <div class="nav-list">
        <div class="nav-item" onclick="changeLanguage()">
            <i class="fas fa-language"></i> <span id="lang-label">Switch to Nepali</span>
        </div>
        <a href="shop.html" class="nav-item"><i class="fas fa-store"></i> <span class="trans" data-en="Shop Panel" data-ne="पसल प्यानल">Shop Panel</span></a>
        <a href="tel:9840109517" class="nav-item"><i class="fas fa-phone-alt"></i> <span>9840109517</span></a>
        <div class="nav-item" style="color:red; margin-top:30px;" onclick="location.href='index.html'"><i class="fas fa-power-off"></i> <span class="trans" data-en="Logout" data-ne="लग आउट">Logout</span></div>
    </div>
</div>

<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3 class="trans" data-en="Edit Profile" data-ne="प्रोफाइल सम्पादन">Edit Profile</h3>
        <input type="text" id="input-name" placeholder="Enter Full Name">
        <button class="btn-save trans" data-en="Save Details" data-ne="विवरण सुरक्षित गर्नुहोस्" onclick="saveProfile()">Save Details</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div class="container">
    <h2 class="trans" data-en="Profit & Loss Report" data-ne="नाफा र नोक्सान रिपोर्ट" style="margin: 0; color: var(--secondary);">Profit & Loss Report</h2>

    <div class="grid">
        <div class="stat-card">
            <h4 class="trans" data-en="Today's Profit" data-ne="आजको नाफा">Today's Profit</h4>
            <p id="todayProfit">₹0</p>
        </div>
        <div class="stat-card">
            <h4 class="trans" data-en="Total Revenue" data-ne="कुल राजस्व">Total Revenue</h4>
            <p id="totalRevenue" style="color:var(--secondary)">₹0</p>
        </div>
    </div>

    <div class="card-long">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 class="trans" data-en="Sales History" data-ne="बिक्री इतिहास" style="margin:0;">Sales History</h3>
            <div style="display:flex; gap:5px;">
                <button id="filterAll" class="filter-btn active-filter trans" data-en="All" data-ne="सबै" onclick="filterHistory('all')">All</button>
                <button id="filterToday" class="filter-btn trans" data-en="Today" data-ne="आज" onclick="filterHistory('today')">Today</button>
            </div>
        </div>
        
        <div id="profitList">
            </div>
    </div>
</div>

<script>
    // --- APP STATE & STORAGE ---
    let salesLogs = JSON.parse(localStorage.getItem('kishan_logs_v4') || '[]');
    let currentLang = localStorage.getItem('hk_lang') || 'en';

    // --- MENU & MODAL LOGIC ---
    function handleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('show');
        document.getElementById('menuBtn').classList.toggle('is-active');
    }

    function openModal() { document.getElementById('profileModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('profileModal').style.display = 'none'; }

    function saveProfile() {
        const n = document.getElementById('input-name').value;
        if(n) {
            document.getElementById('display-name').innerText = n;
            localStorage.setItem('hk_shop_name', n);
        }
        closeModal();
    }

    // --- TRANSLATION SYSTEM ---
    function changeLanguage() {
        currentLang = (currentLang === 'en') ? 'ne' : 'en';
        localStorage.setItem('hk_lang', currentLang);
        applyLanguage();
    }

    function applyLanguage() {
        const els = document.querySelectorAll('.trans');
        els.forEach(el => {
            el.innerText = el.getAttribute('data-' + currentLang);
        });
        document.getElementById('lang-label').innerText = (currentLang === 'en') ? "Switch to Nepali" : "English मा जानुहोस्";
    }

    // --- PROFIT CALCULATION & FILTERING ---
    function filterHistory(type) {
        document.getElementById('filterAll').classList.toggle('active-filter', type === 'all');
        document.getElementById('filterToday').classList.toggle('active-filter', type === 'today');
        calculateProfit(type);
    }

    function calculateProfit(filterType = 'all') {
        let totalRev = 0;
        let totalProf = 0;
        let todayProfVal = 0;
        const todayStr = new Date().toLocaleDateString();

        const list = document.getElementById('profitList');
        list.innerHTML = "";

        const salesOnly = salesLogs.filter(log => log.type === 'sell');

        salesOnly.forEach(log => {
            const buyP = parseFloat(log.buyPrice) || 0;
            const sellP = parseFloat(log.sellPrice) || 0;
            const qty = parseFloat(log.qty) || 0;
            
            const itemRevenue = sellP * qty;
            const itemProfit = (sellP - buyP) * qty;

            totalRev += itemRevenue;
            totalProf += itemProfit;

            if(log.date === todayStr) {
                todayProfVal += itemProfit;
            }

            // Display Logic based on filter
            if(filterType === 'all' || (filterType === 'today' && log.date === todayStr)) {
                list.innerHTML += `
                    <div class="history-row">
                        <span>
                            <b>${log.msg}</b><br>
                            <small style="color:gray;">${log.time} | ${log.date}</small>
                        </span>
                        <span class="profit-text">+₹${itemProfit.toFixed(2)}</span>
                    </div>
                `;
            }
        });

        document.getElementById('todayProfit').innerText = "₹" + todayProfVal.toFixed(2);
        document.getElementById('totalRevenue').innerText = "₹" + totalRev.toFixed(2);

        if(list.innerHTML === "") {
            list.innerHTML = "<p style='text-align:center; color:gray; padding:20px;'>No records found.</p>";
        }
    }

    // --- INITIALIZE ---
    window.onload = () => {
        applyLanguage();
        calculateProfit('all');
        const savedName = localStorage.getItem('hk_shop_name');
        if(savedName) document.getElementById('display-name').innerText = savedName;
    };
</script>

</body>
</html>
